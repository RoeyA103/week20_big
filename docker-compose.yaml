version: "3.9"
services:
  kafka:
      image: confluentinc/cp-kafka:7.8.3
      container_name: kafka
      ports:
        - "9092:9092"
      environment:
        KAFKA_KRAFT_MODE: 'true'
        CLUSTER_ID: '1L6g7nGhU-eAKfL--X25wo'
        KAFKA_NODE_ID: 1

        KAFKA_PROCESS_ROLES: broker,controller
        KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
        KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

        KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
        KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
        KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

        KAFKA_LOG_DIRS: /tmp/kraft-combined-logs

      healthcheck:
        test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
        interval: 10s
        timeout: 5s
        retries: 5
        start_period: 20s

      volumes:
        - kafka_kraft:/var/lib/kafka/data
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.0
    container_name: elasticsearch
    environment:
      - node.name=es01
      - cluster.name=es-docker-cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - xpack.security.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "curl --fail http://localhost:9200/_cat/health?h=st | grep -E 'green|yellow'",
        ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s

  # kibana:
  #   image: docker.elastic.co/kibana/kibana:9.3.0
  #   container_name: kibana
  #   environment:
  #     - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
  #     - xpack.security.enabled=false
  #   ports:
  #     - "5601:5601"
  #   depends_on:
  #     - elasticsearch
  #   restart: unless-stopped
  part_1:
    container_name: part_1
    build:
      context: .
      dockerfile: part_1/Dockerfile
    volumes:
      - ./podcast:/tmp/data
    environment:
      DATA_PATH: /tmp/data
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: metadata 
      ELASTIC_URI: http://elasticsearch:9200
    depends_on:
      kafka:
        condition: service_healthy
  
  part_2:
    container_name: part_2
    build: 
      context: .
      dockerfile: part_2/Dockerfile
    volumes:
      - ./podcast:/tmp/data
    environment:
      KAFKA_GROUP_ID: metadata2-tracker
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: metadata 
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB_NAME: test
      ELASTIC_URI: http://elasticsearch:9200
      ELASTIC_INDEX: podcasts
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  part_3:
    container_name: part_3
    build:
      context: .
      dockerfile: ./part_3/Dockerfile
    environment:
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB_NAME: test
      ELASTIC_URI: http://elasticsearch:9200
      ELASTIC_INDEX: podcasts
    depends_on:
      mongodb:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      


       

volumes:
  kafka_kraft:
  mongo_data:
  es_data: